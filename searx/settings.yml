    url_xpath: .//a/@href
    title_xpath: .//h3
    content_xpath: .//p[@class='app-card__description']
    timeout: 5.0
    disabled: false

# ============================================================= #
#  SEARCH SETTINGS - OPTIMIZED FOR PERFORMANCE
# ============================================================= #
search:
  safe_search: 0
  autocomplete: "duckduckgo"
  autocomplete_min: 2  # CHANGED: Lower threshold
  favicon_resolver: "duckduckgo"
  default_lang: "auto"
  max_results: 50  # CHANGED: Increased from default
  ban_time_on_fail: 3  # CHANGED: Reduced
  max_ban_time_on_fail: 30  # CHANGED: Reduced
  suspended_times:
    SearxEngineAccessDenied: 1800  # CHANGED: 30 min instead of 1 hour
    SearxEngineCaptcha: 1800
    SearxEngineTooManyRequests: 300  # CHANGED: 5 min instead of default
    cf_SearxEngineCaptcha: 43200  # 12 hours
    cf_SearxEngineAccessDenied: 43200
    recaptcha_SearxEngineCaptcha: 604800
  formats:
    - html
    - json
    - rss
    - csv

# ============================================================= #
#  SERVER SETTINGS - OPTIMIZED
# ============================================================= #
server:
  port: 8888
  bind_address: "0.0.0.0"
  base_url: false
  limiter: false  # CHANGED: Disabled for testing
  public_instance: false
  secret_key: "4Z2TOwrferScgsuejhe7883hr!!"
  image_proxy: true
  http_protocol_version: "1.1"
  method: "GET"
  default_http_headers:
    X-Content-Type-Options: nosniff
    X-Download-Options: noopen
    X-Robots-Tag: noindex, nofollow
    Referrer-Policy: no-referrer

# ============================================================= #
#  UI SETTINGS - FIXED SCROLL ISSUE
# ============================================================= #
ui:
  static_path: ""
  templates_path: ""
  query_in_title: true
  infinite_scroll: false  # Keep disabled - causes scroll issues
  default_theme: simple
  center_alignment: false
  default_locale: ""
  search_on_category_select: true  # CHANGED: Enable for better UX
  hotkeys: default
  url_formatting: pretty

# ============================================================= #
#  OUTGOING REQUESTS - PROXY DISABLED FOR TESTING
# ============================================================= #
outgoing:
  request_timeout: 5.0  # CHANGED: Reduced from 15.0
  useragent_suffix: ""
  pool_connections: 100
  pool_maxsize: 20
  enable_http2: false
  # PROXY DISABLED - Enable only if needed
