use_default_settings: true

general:
  debug: false
  instance_name: "StillMind"
  enable_metrics: true

brand:
  new_issue_url: https://github.com/searxng/searxng/issues/new
  docs_url: https://docs.searxng.org/

categories_as_tabs:
  general:
  images:
  videos:
  news:
  science:
  files:
  it:

engines:
  - name: google
    engine: google
    shortcut: go
    categories: general

  - name: bing
    engine: bing
    shortcut: bi
    categories: general

  - name: duckduckgo
    engine: duckduckgo
    shortcut: ddg
    categories: general

  - name: startpage
    engine: startpage
    shortcut: sp
    categories: general

  - name: qwant
    engine: qwant
    shortcut: qw
    categories: general
    qwant_categ: web

  - name: wikipedia
    engine: wikipedia
    shortcut: wp
    categories: general

  - name: google images
    engine: google_images
    shortcut: goi
    categories: images

  - name: bing images
    engine: bing_images
    shortcut: bii
    categories: images

  # FIXED: Use qwant not qwant_images
  - name: qwant images
    engine: qwant
    shortcut: qwi
    categories: images
    qwant_categ: images

  # FIXED: Space not underscore
  - name: youtube noapi
    engine: youtube_noapi
    shortcut: yt
    categories: videos

  - name: bing videos
    engine: bing_videos
    shortcut: biv
    categories: videos

  - name: google videos
    engine: google_videos
    shortcut: gov
    categories: videos

  - name: dailymotion
    engine: dailymotion
    shortcut: dm
    categories: videos

  - name: bing news
    engine: bing_news
    shortcut: bin
    categories: news

  - name: startpage news
    engine: startpage
    shortcut: spn
    categories: news

  # REMOVED: duckduckgo_extra doesn't exist

  - name: arxiv
    engine: arxiv
    shortcut: arx
    categories: science

  - name: pubmed
    engine: pubmed
    shortcut: pub
    categories: science

  - name: bt4g
    engine: bt4g
    shortcut: bt
    categories: files

  - name: solidtorrents
    engine: solidtorrents
    shortcut: st
    categories: files

  - name: piratebay
    engine: piratebay
    shortcut: tp
    categories: files

  - name: github
    engine: github
    shortcut: gh
    categories: it

  - name: gitlab
    engine: gitlab
    shortcut: gl
    categories: it

  - name: stackoverflow
    engine: stackexchange
    shortcut: so
    api_site: 'stackoverflow'
    categories: it

search:
  safe_search: 0
  autocomplete: "duckduckgo"
  autocomplete_min: 4
  favicon_resolver: ""  # FIXED: Empty to avoid favicons.toml
  default_lang: "auto"
  formats:
    - html
    - json
    - rss

server:
  port: 8080  # FIXED: Koyeb uses 8080
  bind_address: "0.0.0.0"
  base_url: false
  limiter: false
  public_instance: false
  secret_key: "your-secret-key-min-16-chars-long!!"  # FIXED: 16+ chars
  image_proxy: true
  http_protocol_version: "1.1"

ui:
  query_in_title: true
  infinite_scroll: true
  default_theme: simple
  search_on_category_select: true

outgoing:
  request_timeout: 15.0
  pool_connections: 100
  pool_maxsize: 20
  enable_http2: false
  proxies:
    http:
      - http://udizufzc-rotate:2ile7xfmbivj@p.webshare.io:80
    https:
      - http://udizufzc-rotate:2ile7xfmbivj@p.webshare.io:80
  # REMOVED: headers section doesn't exist in SearxNG

plugins:
  searx.plugins.calculator.SXNGPlugin:
    active: true
  searx.plugins.hash_plugin.SXNGPlugin:
    active: true
  searx.plugins.self_info.SXNGPlugin:
    active: true
  searx.plugins.unit_converter.SXNGPlugin:
    active: true
  searx.plugins.ahmia_filter.SXNGPlugin:
    active: true
  searx.plugins.hostnames.SXNGPlugin:
    active: true
  searx.plugins.time_zone.SXNGPlugin:
    active: true
  searx.plugins.tracker_url_remover.SXNGPlugin:
    active: true

doi_resolvers:
  oadoi.org: 'https://oadoi.org/'
  doi.org: 'https://doi.org/'

default_doi_resolver: 'oadoi.org'
