# ============================================================= #
#  TROUBLESHOOTING STEPS
# ============================================================= #
#
# 1. CHECK LOGS:
#    docker logs searxng -f
#    OR
#    tail -f /var/log/searxng/searxng.log
#
# 2. TEST JSON OUTPUT:
#    curl "http://localhost:8888/search?q=test&format=json"
#
# 3. TEST INDIVIDUAL ENGINE:
#    curl "http://localhost:8888/search?q=test&engines=duckduckgo&format=json"
#
# 4. VERIFY PROXY (if enabled):
#    curl -x http://your-proxy:80 https://www.google.com
#
# 5. CHECK BROWSER CONSOLE:
#    F12 -> Console tab -> Look for JavaScript errors
#
# 6. TEST WITHOUT PROXY:
#    Comment out the proxies section and restart
#
# 7. REDUCE ENGINE COUNT:
#    This config uses only native engines for stability
#
# 8. INCREASE LOGGING:
#    Set debug: true in general section (already done above)
#
# 9. CHECK NETWORK:
#    ping 8.8.8.8
#    curl https://www.google.com
#
# 10. VERIFY PORT:
#     netstat -tulpn | grep 8888
#
# ============================================================= #
#  COMMON ISSUES & FIXES
# ============================================================= #
#
# ISSUE: Few results
# FIX: 
#   - Disabled proxy (see outgoing section)
#   - Reduced timeouts to 5s
#   - Using only native engines
#   - Increased max_results to 50
#
# ISSUE: Can't scroll
# FIX:
#   - infinite_scroll: false
#   - Check browser console for JS errors
#   - Try different theme
#   - Clear browser cache
#
# ISSUE: Slow searches
# FIX:
#   - Reduced request_timeout to 5.0
#   - Disabled problematic XPath engines
#   - Proxy disabled
#
# ISSUE: Engines timing out
# FIX:
#   - All timeouts set to 5s
#   - Removed slow custom engines
#   - Proxy disabled for direct connections
#
# ============================================================= #