use_default_settings: true

general:
  debug: false
  instance_name: "StillMind"
  enable_metrics: true

brand:
  new_issue_url: https://github.com/searxng/searxng/issues/new
  docs_url: https://docs.searxng.org/

categories_as_tabs:
  general:
  images:
  videos:
  news:
  dev:

engines:
  - name: google
    engine: google
    shortcut: go
    categories: general

  - name: bing
    engine: bing
    shortcut: bi
    categories: general

  - name: duckduckgo
    engine: duckduckgo
    shortcut: ddg
    categories: general

  - name: unsplash
    engine: unsplash
    shortcut: us
    categories: images

  - name: pexels
    engine: pexels
    shortcut: px
    categories: images

  - name: youtube
    engine: youtube_noapi
    shortcut: yt
    categories: videos

  - name: google news
    engine: google_news
    shortcut: gon
    categories: news

  - name: github
    engine: github
    shortcut: gh
    categories: dev

  - name: stackoverflow
    engine: stackexchange
    shortcut: so
    api_site: 'stackoverflow'
    categories: dev

  - name: pypi
    engine: pypi
    shortcut: pypi
    categories: dev

search:
  safe_search: 0
  autocomplete: "duckduckgo"
  formats: [html, json]

server:
  port: 8888
  bind_address: "0.0.0.0"
  base_url: false
  limiter: false
  public_instance: false
  secret_key: "test-secret-key-change-in-production"
  image_proxy: true

ui:
  query_in_title: true
  infinite_scroll: true
  default_theme: simple

# ============================================================
