# ============================================================
# SEARCH SETTINGS
# ============================================================
search:
  safe_search: 0
  autocomplete: "duckduckgo"
  autocomplete_min: 4
  favicon_resolver: "duckduckgo"
  default_lang: "auto"
  ban_time_on_fail: 5
  max_ban_time_on_fail: 60
  suspended_times:
    SearxEngineAccessDenied: 3600
    SearxEngineCaptcha: 3600
    SearxEngineTooManyRequests: 5
    cf_SearxEngineCaptcha: 86400
    cf_SearxEngineAccessDenied: 86400
    recaptcha_SearxEngineCaptcha: 604800
  formats:
    - html
    - json
    - rss

# ============================================================
# SERVER SETTINGS
# ============================================================
server:
  port: 8888
  bind_address: "0.0.0.0"
  base_url: false
  limiter: false
  public_instance: false
  secret_key: "4Z2TOwrferScgsuejhe7883hr"
  image_proxy: true
  http_protocol_version: "1.1"
  method: "GET"
  default_http_headers:
    X-Content-Type-Options: nosniff
    X-Download-Options: noopen
    X-Robots-Tag: noindex, nofollow
    Referrer-Policy: no-referrer

# ============================================================
# UI SETTINGS
# ============================================================
ui:
  static_path: ""
  templates_path: ""
  query_in_title: true
  infinite_scroll: true
  default_theme: simple
  center_alignment: false
  default_locale: ""
  search_on_category_select: true
  hotkeys: default
  url_formatting: pretty

# ============================================================
# OUTGOING - PROXY DISABLED UNTIL FIXED
# ============================================================
outgoing:
  request_timeout: 15.0
  useragent_suffix: ""
  pool_connections: 100
  pool_maxsize: 20
  enable_http2: false
  # DISABLED: Proxy credentials not working (407 error)
  # Fix your Webshare credentials first, then uncomment:
  # proxies:
  #   http:
  #     - http://USERNAME:PASSWORD@p.webshare.io:80
  #   https:
  #     - http://USERNAME:PASSWORD@p.webshare.io:80

# ============================================================
# PLUGINS
# ============================================================
plugins:
  searx.plugins.calculator.SXNGPlugin:
