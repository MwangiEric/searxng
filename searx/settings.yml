use_default_settings: true

general:
  debug: false
  instance_name: "StillMind"
  enable_metrics: true

brand:
  new_issue_url: https://github.com/searxng/searxng/issues/new
  docs_url: https://docs.searxng.org/

categories_as_tabs:
  general:
  images:
  videos:
  news:
  dev:

engines:

  # --- GENERAL ---
  - name: google
    engine: google
    shortcut: go
    categories: general
    use_mobile_ui: false

  - name: bing
    engine: bing
    shortcut: bi
    categories: general

  - name: duckduckgo
    engine: duckduckgo
    shortcut: ddg
    categories: general

  - name: startpage
    engine: startpage
    shortcut: sp
    timeout: 6.0
    categories: general

  - name: qwant
    engine: qwant
    shortcut: qw
    categories: general
    timeout: 8.0

  - name: wikipedia
    engine: wikipedia
    shortcut: wp
    categories: [general]
    base_url: "https://{language}.wikipedia.org/"
    enable_http: true

  - name: wikidata
    engine: wikidata
    shortcut: wd
    categories: [general]
    timeout: 3.0

  - name: duckduckgo definitions
    engine: duckduckgo_definitions
    shortcut: ddd
    weight: 2
    categories: general

  # --- IMAGES (Native only - no XPath) ---
  - name: unsplash
    engine: unsplash
    shortcut: us
    categories: images

  - name: openverse
    engine: openverse
    shortcut: opv
    categories: images

  - name: google images
    engine: google_images
    shortcut: goi
    categories: images

  - name: bing images
    engine: bing_images
    shortcut: bii
    categories: images

  # --- VIDEOS ---
  - name: youtube
    engine: youtube_noapi
    shortcut: yt
    categories: videos

  - name: bing videos
    engine: bing_videos
    shortcut: biv
    categories: videos

  - name: google videos
    engine: google_videos
    shortcut: gov
    categories: videos

  # --- NEWS ---
  - name: google news
    engine: google_news
    shortcut: gon
    categories: news

  - name: bing news
    engine: bing_news
    shortcut: bin
    categories: news

  - name: reddit
    engine: reddit
    shortcut: re
    page_size: 25
    categories: [news, social]

  - name: hackernews
    engine: hackernews
    shortcut: hn
    categories: [news, social, dev]

  # --- DEV (Single github entry, no duplicates) ---
  - name: github
    engine: github
    shortcut: gh
    categories: [dev, files]

  - name: gitlab
    engine: gitlab
    shortcut: gl
    categories: [dev, files]

  - name: stackoverflow
    engine: stackexchange
    shortcut: so
    api_site: 'stackoverflow'
    categories: [dev]

  - name: npm
    engine: npm
    shortcut: npm
    categories: [dev, packages]

  - name: pypi
    engine: pypi
    shortcut: pypi
    categories: [dev, packages]

  # --- MUSIC ---
  - name: soundcloud
    engine: soundcloud
    shortcut: sc
    categories: music
    disabled: true  # Fails to initialize, disable for now

  - name: bandcamp
    engine: bandcamp
    shortcut: bc
    categories: music

  - name: mixcloud
    engine: mixcloud
    shortcut: mc
    categories: music

search:
  safe_search: 0
  autocomplete: "duckduckgo"
  autocomplete_min: 4
  favicon_resolver: "duckduckgo"
  default_lang: "auto"
  ban_time_on_fail: 5
  max_ban_time_on_fail: 60
  suspended_times:
    SearxEngineAccessDenied: 3600
    SearxEngineCaptcha: 3600
    SearxEngineTooManyRequests: 5
    cf_SearxEngineCaptcha: 86400
    cf_SearxEngineAccessDenied: 86400
    recaptcha_SearxEngineCaptcha: 604800
  formats:
    - html
    - json
    - rss

server:
  port: 8888
  bind_address: "0.0.0.0"
  base_url: false
  limiter: false
  public_instance: false
  secret_key: "your-secret-key-here-min-16-chars"
  image_proxy: true
  http_protocol_version: "1.1"
  method: "GET"
  default_http_headers:
    X-Content-Type-Options: nosniff
    X-Download-Options: noopen
    X-Robots-Tag: noindex, nofollow
    Referrer-Policy: no-referrer

ui:
  static_path: ""
  templates_path: ""
  query_in_title: true
  infinite_scroll: true
  default_theme: simple
  center_alignment: false
  default_locale: ""
  search_on_category_select: true
  hotkeys: default
  url_formatting: pretty

outgoing:
  request_timeout: 12.0
  useragent_suffix: ""
  pool_connections: 100
  pool_maxsize: 20
  enable_http2: true
  proxies: {}
  # Proxy disabled for now - enable later:
  # proxies:
  #   http: "http://udizufzc-rotate:2ile7xfmbivj@p.webshare.io:80"
  #   https: "http://udizufzc-rotate:2ile7xfmbivj@p.webshare.io:80"

plugins:
  searx.plugins.calculator.SXNGPlugin:
    active: true
  searx.plugins.hash_plugin.SXNGPlugin:
    active: true
  searx.plugins.self_info.SXNGPlugin:
    active: true
  searx.plugins.unit_converter.SXNGPlugin:
    active: true
  searx.plugins.ahmia_filter.SXNGPlugin:
    active: true
  searx.plugins.hostnames.SXNGPlugin:
    active: true
  searx.plugins.time_zone.SXNGPlugin:
    active: true
  searx.plugins.tracker_url_remover.SXNGPlugin:
    active: true

doi_resolvers:
  oadoi.org: 'https://oadoi.org/'
  doi.org: 'https://doi.org/'

default_doi_resolver: 'oadoi.org'
