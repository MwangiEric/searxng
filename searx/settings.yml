use_default_settings: true

general:
  debug: false
  instance_name: "StillMind"
  privacypolicy_url: false
  donation_url: false
  contact_url: false
  enable_metrics: true

brand:
  new_issue_url: https://github.com/searxng/searxng/issues/new
  docs_url: https://docs.searxng.org/
  public_instances: https://searx.space
  wiki_url: https://github.com/searxng/searxng/wiki
  issue_url: https://github.com/searxng/searxng/issues

# ============================================================
# CATEGORIES
# ============================================================
categories_as_tabs:
  general:
  images:
  videos:
  news:
  music:
  it:           # Tech/IT
  science:
  files:
  social:
  dev:          # Development
  ai:           # AI/ML tools
  design:       # Visual assets
  misc:         # Utilities

# ============================================================
# ENGINES - GENERAL
# ============================================================
engines:

  # --- Core General Search ---
  - name: google
    engine: google
    shortcut: go
    categories: general
    use_mobile_ui: false

  - name: bing
    engine: bing
    shortcut: bi
    categories: general

  - name: duckduckgo
    engine: duckduckgo
    shortcut: ddg
    categories: general

  - name: brave
    engine: brave
    shortcut: brave
    categories: general
    timeout: 5.0

  - name: startpage
    engine: startpage
    shortcut: sp
    timeout: 6.0
    categories: general

  - name: qwant
    engine: qwant
    shortcut: qw
    categories: general
    timeout: 8.0

  - name: mojeek
    engine: mojeek
    shortcut: mjk
    categories: general
    timeout: 8.0

  - name: swisscows
    engine: swisscows
    shortcut: swc
    categories: general
    timeout: 8.0

  - name: yandex
    engine: yandex
    shortcut: ya
    categories: general
    timeout: 8.0

  - name: wiby
    engine: json_engine
    shortcut: wib
    categories: [general]
    search_url: https://wiby.me/json/?q={query}
    url_query: URL
    title_query: Title
    content_query: Snippet
    disabled: false

  - name: presearch
    engine: presearch
    shortcut: ps
    categories: [general, web]
    timeout: 4.0

  # --- Wikipedia & Knowledge ---
  - name: wikipedia
    engine: wikipedia
    shortcut: wp
    categories: [general]
    base_url: "https://{language}.wikipedia.org/"
    enable_http: true

  - name: wikidata
    engine: wikidata
    shortcut: wd
    categories: [general]
    timeout: 3.0

  - name: wiktionary
    engine: mediawiki
    shortcut: wikt
    categories: [general]
    base_url: "https://{language}.wiktionary.org/"
    number_of_results: 5
    search_type: text
    disabled: true

  - name: duckduckgo definitions
    engine: duckduckgo_definitions
    shortcut: ddd
    weight: 2
    categories: general

  - name: wordnik
    engine: wordnik
    shortcut: def
    categories: [general]
    timeout: 5.0

  - name: etymonline
    engine: xpath
    shortcut: et
    categories: [general]
    paging: true
    search_url: https://etymonline.com/search?page={pageno}&q={query}
    url_xpath: //a[contains(@class, "word__name--")]/@href
    title_xpath: //a[contains(@class, "word__name--")]
    content_xpath: //section[contains(@class, "word__defination")]
    first_page_num: 1

