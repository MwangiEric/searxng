  - name: selfhst icons
    engine: selfhst
    shortcut: sh
    categories: [images, design]

  # --- Essential XPath Image Engines ---
  - name: freepik
    engine: xpath
    shortcut: fp
    categories: [images, design]
    paging: true
    first_page_num: 1
    page_size: 20
    search_url: https://www.freepik.com/search?format=search&query={query}&type=photo
    results_xpath: //figure[contains(@class,'showcase__item')]
    url_xpath: .//a/@href
    title_xpath: .//a/@title
    content_xpath: .//img/@alt
    thumbnail_xpath: .//img/@data-src
    timeout: 10.0

  - name: rawpixel
    engine: xpath
    shortcut: raw
    categories: [images, design]
    paging: true
    first_page_num: 1
    page_size: 20
    search_url: https://www.rawpixel.com/search/{query}?sort=curated&mode=free&page={pageno}
    results_xpath: //div[contains(@class,'grid-item')]
    url_xpath: .//a/@href
    title_xpath: .//img/@alt
    content_xpath: .//img/@alt
    thumbnail_xpath: .//img/@src
    timeout: 10.0

  - name: stocksnap
    engine: xpath
    shortcut: ss
    categories: images
    paging: true
    first_page_num: 1
    page_size: 20
    search_url: https://stocksnap.io/search/{query}?page={pageno}
    results_xpath: //a[contains(@class,'photo-grid-item')]
    url_xpath: ./@href
    title_xpath: ./img/@alt
    content_xpath: ./img/@src
    thumbnail_xpath: ./img/@src

  - name: openclipart
    engine: xpath
    shortcut: oclip
    categories: [images, design]
    paging: true
    first_page_num: 1
    page_size: 20
    search_url: https://openclipart.org/search/?query={query}&page={pageno}
    results_xpath: //div[contains(@class,'gallery-item')]
    url_xpath: .//a/@href
    title_xpath: .//img/@alt
    content_xpath: .//img/@alt
    thumbnail_xpath: .//img/@src
    timeout: 8.0

  - name: tineye
    engine: tineye
    shortcut: tin
    timeout: 9.0
    categories: images    # Reverse image search

  - name: frinkiac
    engine: frinkiac
    shortcut: frk
    timeout: 3.0
    categories: images    # Simpsons screenshots
    disabled: true        # As requested

