use_default_settings: true

general:
  debug: false
  instance_name: "StillMind"
  privacypolicy_url: false
  donation_url: false
  contact_url: false
  enable_metrics: true

brand:
  new_issue_url: https://github.com/searxng/searxng/issues/new
  docs_url: https://docs.searxng.org/
  public_instances: https://searx.space
  wiki_url: https://github.com/searxng/searxng/wiki
  issue_url: https://github.com/searxng/searxng/issues

categories_as_tabs:
  general:
  images:
  videos:
  news:
  music:
  it:
  science:
  files:
  social:
  dev:
  ai:
  design:
  tools:
  packages:
  docs:
  alternatives:
  misc:

engines:
  # ============================================================= #
  #  GENERAL SEARCH - Native Engines
  # ============================================================= #
  - name: google
    engine: google
    shortcut: go
    categories: general
    use_mobile_ui: false
    timeout: 10.0

  - name: bing
    engine: bing
    shortcut: bi
    categories: general
    timeout: 10.0

  - name: duckduckgo
    engine: duckduckgo
    shortcut: ddg
    categories: general
    timeout: 10.0

  - name: startpage
    engine: startpage
    shortcut: sp
    categories: general
    timeout: 10.0

  - name: qwant
    engine: qwant
    shortcut: qw
    categories: general
    qwant_categ: web
    timeout: 10.0

  - name: wikipedia
    engine: wikipedia
    shortcut: wp
    categories: general
    base_url: "https://{language}.wikipedia.org/"

  - name: brave
    engine: brave
    shortcut: brave
    categories: general
    timeout: 10.0

  # ============================================================= #
  #  GENERAL SEARCH - Custom XPath
  # ============================================================= #
  - name: searchmysite
    engine: xpath
    shortcut: sms
    categories: general
    paging: true
    first_page_num: 1
    page_size: 10
    search_url: https://searchmysite.net/search/?q={query}&page={pageno}
    results_xpath: //div[@class="result"]
    url_xpath: .//a/@href
    title_xpath: .//h3
    content_xpath: .//p
    timeout: 10.0

  - name: mojeek
    engine: xpath
    shortcut: mjk
    categories: general
    paging: true
    first_page_num: 1
    page_size: 10
    search_url: https://www.mojeek.com/search?q={query}&s={pageno}
    results_xpath: //li[@class='result']
    url_xpath: .//a[@class='ob']/@href
    title_xpath: .//a[@class='ob']
    content_xpath: .//p[@class='s']
    timeout: 10.0

  - name: wiby
    engine: xpath
    shortcut: wib
    categories: [general, misc]
    paging: false
    search_url: https://wiby.me/?q={query}
    results_xpath: //div[@class='result']
    url_xpath: .//a/@href
    title_xpath: .//a
    content_xpath: .//p
    timeout: 10.0

  # ============================================================= #
  #  IMAGES - Native Engines
  # ============================================================= #
  - name: google images
    engine: google_images
    shortcut: goi
    categories: images
    timeout: 15.0

  - name: bing images
    engine: bing_images
    shortcut: bii
    categories: images
    timeout: 10.0

  - name: qwant images
    engine: qwant
    shortcut: qwi
    categories: images
    qwant_categ: images
    timeout: 10.0

  - name: unsplash
    engine: unsplash
    shortcut: us
    categories: images

  - name: flickr
    engine: flickr_noapi
    shortcut: fl
    categories: images

  # ============================================================= #
  #  IMAGES - Custom XPath
  # ============================================================= #
  - name: freepik
    engine: xpath
    shortcut: fp
    categories: [images, design]
    paging: true
    first_page_num: 1
    page_size: 20
    search_url: https://www.freepik.com/search?format=search&query={query}&type=photo&page={pageno}
    results_xpath: //figure[contains(@class,'showcase__item')]
    url_xpath: .//a/@href
    title_xpath: .//a/@title
    content_xpath: .//img/@alt
    thumbnail_xpath: .//img/@data-src
    timeout: 10.0

  - name: rawpixel
    engine: xpath
    shortcut: raw
    categories: [images, design]
    paging: true
    first_page_num: 1
    page_size: 20
    search_url: https://www.rawpixel.com/search/{query}?sort=curated&mode=free&page={pageno}
    results_xpath: //div[contains(@class,'grid-item')]
    url_xpath: .//a/@href
    title_xpath: .//img/@alt
    content_xpath: .//img/@alt
    thumbnail_xpath: .//img/@src
    timeout: 10.0

  - name: stocksnap
    engine: xpath
    shortcut: ss
    categories: images
    paging: true
    first_page_num: 1
    page_size: 20
    search_url: https://stocksnap.io/search/{query}?page={pageno}
    results_xpath: //a[contains(@class,'photo-grid-item')]
    url_xpath: ./@href
    title_xpath: ./img/@alt
    content_xpath: ./img/@src
    thumbnail_xpath: ./img/@src
    timeout: 10.0

  - name: pixabay
    engine: xpath
    shortcut: pxb
    categories: images
    paging: true
    first_page_num: 1
    page_size: 20
    search_url: https://pixabay.com/images/search/{query}/?pagi={pageno}
    results_xpath: //div[@data-testid="item"]
    url_xpath: .//a/@href
    title_xpath: .//img/@alt
    thumbnail_xpath: .//img/@src
    timeout: 10.0

  - name: pexels
    engine: xpath
    shortcut: px
    categories: images
    paging: true
    first_page_num: 1
    page_size: 30
    search_url: https://www.pexels.com/search/{query}/?page={pageno}
    results_xpath: //article[@data-testid='photo-grid-item']//a[1]
    url_xpath: ./@href
    title_xpath: ./img/@alt
    thumbnail_xpath: ./img/@src
    timeout: 10.0

