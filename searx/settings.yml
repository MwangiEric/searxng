  - name: pypi
    engine: pypi
    shortcut: pypi
    categories: [dev, packages]

  - name: packagist
    engine: json_engine
    shortcut: pack
    categories: [dev, packages]
    paging: true
    search_url: https://packagist.org/search.json?q={query}&page={pageno}
    results_query: results
    url_query: url
    title_query: name
    content_query: description

  - name: rubygems
    engine: xpath
    shortcut: rbg
    categories: [dev, packages]
    paging: true
    search_url: https://rubygems.org/search?page={pageno}&query={query}
    results_xpath: //a[contains(@class,"gems__gem")]
    url_xpath: ./@href
    title_xpath: ./span/h2
    content_xpath: ./span/p
    first_page_num: 1

  - name: metacpan
    engine: metacpan
    shortcut: cpan
    categories: [dev, packages]

  - name: pkg.go.dev
    engine: pkg_go_dev
    shortcut: go.dev
    categories: [dev, packages]

  - name: anaconda
    engine: xpath
    shortcut: conda
    categories: [dev, packages]
    paging: true
    search_url: https://anaconda.org/search?q={query}&page={pageno}
    results_xpath: //div[contains(@class,'package-item')]
    url_xpath: .//a/@href
    title_xpath: .//h3
    content_xpath: .//p
    first_page_num: 1

  - name: mdn
    engine: json_engine
    shortcut: mdn
    categories: [dev, it]
    paging: true
    search_url: https://developer.mozilla.org/api/v1/search?q={query}&page={pageno}
    results_query: documents
    url_query: mdn_url
    title_query: title
    content_query: summary
    first_page_num: 1

  - name: readthedocs
    engine: readthedocs
    shortcut: rtd
    categories: [dev, it]

  - name: docker hub
    engine: docker_hub
    shortcut: dh
    categories: [dev, packages]

  - name: hoogle
    engine: xpath
    shortcut: ho
    categories: [dev, it]
    paging: true
    search_url: https://hoogle.haskell.org/?hoogle={query}&start={pageno}
    results_xpath: //div[@class="result"]
    title_xpath: .//div[@class="ans"]//a
    url_xpath: .//div[@class="ans"]//a/@href
    content_xpath: .//div[@class="from"]
    page_size: 20

  - name: mankier
    engine: json_engine
    shortcut: man
    categories: [dev, it]
    search_url: https://www.mankier.com/api/v2/mans/?q={query}
    results_query: results
    url_query: url
    title_query: name
    content_query: description

  - name: lobste.rs
    engine: xpath
    shortcut: lo
    categories: [social, it]
    search_url: https://lobste.rs/search?utf8=%E2%9C%93&q={query}&what=stories&order=relevance
    results_xpath: //li[contains(@class, "story")]
    url_xpath: .//a[@class="u-url"]/@href
    title_xpath: .//a[@class="u-url"]
    content_xpath: .//a[@class="domain"]
    timeout: 5.0

