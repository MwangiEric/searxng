# ============================================================= #
#  DIAGNOSIS CHECKLIST - Review these first
# ============================================================= #
#
# ISSUE 1: Few results in JSON
# Possible causes:
# - Engines timing out (reduce timeout values)
# - Proxy blocking requests (disable proxy temporarily)
# - Engines failing silently (check logs)
# - Rate limiting from search engines
# - Wrong XPath selectors
#
# ISSUE 2: Can't scroll down
# Possible causes:
# - infinite_scroll setting
# - JavaScript conflicts
# - CSS issues in theme
# - Browser compatibility
#
# SOLUTION: Optimized configuration below
# ============================================================= #

