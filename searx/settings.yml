use_default_settings: true

general:
  debug: false
  instance_name: "StillMind"
  privacypolicy_url: false
  donation_url: false
  contact_url: false
  enable_metrics: true

brand:
  new_issue_url: https://github.com/searxng/searxng/issues/new
  docs_url: https://docs.searxng.org/
  public_instances: https://searx.space
  wiki_url: https://github.com/searxng/searxng/wiki
  issue_url: https://github.com/searxng/searxng/issues

categories_as_tabs:
  general:
  images:
  videos:
  news:
  music:
  it:
  science:
  files:
  social:
  dev:
  ai:
  design:
  misc:

engines:
  # --- GENERAL (Native) ---
  - name: google
    engine: google
    shortcut: go
    categories: general
    use_mobile_ui: false
    timeout: 10.0

  - name: bing
    engine: bing
    shortcut: bi
    categories: general
    timeout: 10.0

  - name: duckduckgo
    engine: duckduckgo
    shortcut: ddg
    categories: general
    timeout: 10.0

  - name: startpage
    engine: startpage
    shortcut: sp
    categories: general
    timeout: 10.0

  - name: qwant
    engine: qwant
    shortcut: qw
    categories: general
    qwant_categ: web
    timeout: 10.0

  - name: wikipedia
    engine: wikipedia
    shortcut: wp
    categories: general
    base_url: "https://{language}.wikipedia.org/"

  # --- GENERAL (XPath) ---
  - name: rightdao
    engine: xpath
    shortcut: rd
    categories: general
    paging: true
    search_url: https://rightdao.com/search?q={query}&page={pageno}
    results_xpath: //div[@class="result"]
    url_xpath: .//a/@href
    title_xpath: .//h3
    content_xpath: .//p
    timeout: 10.0

  - name: searchmysite
    engine: xpath
    shortcut: sms
    categories: general
    paging: true
    search_url: https://searchmysite.net/search/?q={query}&page={pageno}
    results_xpath: //div[@class="result"]
    url_xpath: .//a/@href
    title_xpath: .//h3
    content_xpath: .//p
    timeout: 10.0

  # --- IMAGES (Native) ---
  - name: google images
    engine: google_images
    shortcut: goi
    categories: images
    timeout: 15.0

  - name: bing images
    engine: bing_images
    shortcut: bii
    categories: images
    timeout: 10.0

  - name: qwant images
    engine: qwant
    shortcut: qwi
    categories: images
    qwant_categ: images
    timeout: 10.0

  # --- IMAGES (XPath) ---
  - name: freepik
    engine: xpath
    shortcut: fp
    categories: [images, design]
    paging: true
    first_page_num: 1
    page_size: 20
    search_url: https://www.freepik.com/search?format=search&query={query}&type=photo
    results_xpath: //figure[contains(@class,'showcase__item')]
    url_xpath: .//a/@href
    title_xpath: .//a/@title
    content_xpath: .//img/@alt
    thumbnail_xpath: .//img/@data-src
    timeout: 10.0

  - name: rawpixel
    engine: xpath
    shortcut: raw
    categories: [images, design]
    paging: true
    first_page_num: 1
    page_size: 20
    search_url: https://www.rawpixel.com/search/{query}?sort=curated&mode=free&page={pageno}
    results_xpath: //div[contains(@class,'grid-item')]
    url_xpath: .//a/@href
    title_xpath: .//img/@alt
    content_xpath: .//img/@alt
    thumbnail_xpath: .//img/@src
    timeout: 10.0

  - name: stocksnap
    engine: xpath
    shortcut: ss
    categories: images
    paging: true
    first_page_num: 1
    page_size: 20
    search_url: https://stocksnap.io/search/{query}?page={pageno}
    results_xpath: //a[contains(@class,'photo-grid-item')]
    url_xpath: ./@href
    title_xpath: ./img/@alt
    content_xpath: ./img/@src
    thumbnail_xpath: ./img/@src
    timeout: 10.0

  # --- VIDEOS (Native) ---
  - name: youtube noapi
    engine: youtube_noapi
    shortcut: yt
    categories: videos
    timeout: 10.0

  - name: bing videos
    engine: bing_videos
    shortcut: biv
    categories: videos
    timeout: 10.0

  - name: google videos
    engine: google_videos
    shortcut: gov
    categories: videos
    timeout: 10.0

  - name: dailymotion
    engine: dailymotion
    shortcut: dm
    categories: videos

  # --- NEWS (Native) ---
  - name: bing news
    engine: bing_news
    shortcut: bin
    categories: news

  - name: startpage news
    engine: startpage
    shortcut: spn
    categories: news

  - name: reddit
    engine: reddit
    shortcut: re
    categories: [news, social]

  - name: hackernews
    engine: hackernews
    shortcut: hn
    categories: [news, it]

  # --- NEWS (XPath) ---
  - name: bbc
    engine: xpath
    shortcut: bbc
    categories: news
    paging: false
    search_url: https://www.bbc.co.uk/search?q={query}
    results_xpath: //div[contains(@class,'ssrcss-')]
    url_xpath: .//a/@href
    title_xpath: .//h2
    content_xpath: .//p
    timeout: 10.0

  - name: guardian
    engine: xpath
    shortcut: grd
    categories: news
    paging: true
    search_url: https://www.theguardian.com/search?q={query}&page={pageno}
    results_xpath: //li[contains(@class,'fc-slice__item')]
    url_xpath: .//a/@href
    title_xpath: .//a
    content_xpath: .//p
    timeout: 10.0

  # --- MUSIC (Native) ---
  - name: soundcloud
    engine: soundcloud
    shortcut: sc
    categories: music

  - name: bandcamp
    engine: bandcamp
    shortcut: bdc
    categories: music

  # --- DEV (Native) ---
  - name: github
    engine: github
    shortcut: gh
    categories: dev

  - name: gitlab
    engine: gitlab
    shortcut: gl
    categories: dev

  - name: stackoverflow
    engine: stackexchange
    shortcut: so
    api_site: 'stackoverflow'
    categories: [dev, it]

  # --- DEV (XPath) ---
  - name: codeberg
    engine: xpath
    shortcut: cb
    categories: [dev, files]
    search_url: https://codeberg.org/api/v1/repos/search?q={query}&limit=10
    url_query: html_url
    title_query: name
    content_query: description

  - name: gitlab snippets
    engine: xpath
    shortcut: gls
    categories: dev
    paging: true
    search_url: https://gitlab.com/search?search={query}&scope=snippets&page={pageno}
    results_xpath: //li[contains(@class,'snippet-row')]
    url_xpath: .//a/@href
    title_xpath: .//a
    content_xpath: .//p
    timeout: 10.0

  # --- IT (Native) ---
  - name: arch linux wiki
    engine: archlinux
    shortcut: al
    categories: it

  # --- SCIENCE (Native) ---
  - name: arxiv
    engine: arxiv
    shortcut: arx
    categories: science

  - name: google scholar
    engine: google_scholar
    shortcut: gos
    categories: science

  - name: pubmed
    engine: pubmed
    shortcut: pub
    categories: science

  - name: openalex
    engine: openalex
    shortcut: oa
    categories: science

  - name: semantic scholar
    engine: semantic_scholar
    shortcut: se
    categories: science

  # --- FILES (Native) ---
  - name: annas archive
    engine: annas_archive
    shortcut: an
    categories: files

  - name: piratebay
    engine: piratebay
    shortcut: tpb
    categories: files

  - name: 1337x
    engine: 1337x
    shortcut: 1337x
    categories: files

  - name: solidtorrents
    engine: solidtorrents
    shortcut: solid
    categories: files

  - name: bt4g
    engine: bt4g
    shortcut: bt4g
    categories: files

  # --- FILES (XPath) ---
  - name: lime torrents
    engine: xpath
    shortcut: lime
    categories: files
    paging: true
    search_url: https://www.limetorrents.lol/search/all/{query}/seeds/{pageno}/
    results_xpath: //table[contains(@class,'table2')]//tr[position()>1]
    url_xpath: .//a/@href
    title_xpath: .//a
    content_xpath: .//td[2]
    timeout: 10.0

search:
  safe_search: 0
  autocomplete: "duckduckgo"
  autocomplete_min: 4
  favicon_resolver: "duckduckgo"
  default_lang: "auto"
  ban_time_on_fail: 5
  max_ban_time_on_fail: 60
  suspended_times:
    SearxEngineAccessDenied: 3600
    SearxEngineCaptcha: 3600
    SearxEngineTooManyRequests: 5
    cf_SearxEngineCaptcha: 86400
    cf_SearxEngineAccessDenied: 86400
    recaptcha_SearxEngineCaptcha: 604800
  formats:
    - html
    - json
    - rss

